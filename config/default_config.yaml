api_keys:
  anthropic: ''
  deepl: ''
  google: ''
  openai: ''
  papago_client_id: ''
  papago_client_secret: ''
  xai: ''
app:
  language: ko
  name: trans_image
  recent_files:
  - /Users/yuhyeon/Documents/proj/trans_image/trans_test_images
  theme: dark
  version: 0.1.0
chat:
  default_output_suffix: _translated
  enabled: true
  llm_model: claude-haiku-4-5-20251001
  llm_provider: anthropic
  max_history: 50
export:
  default_format: png
  jpg_quality: 95
  output_dir: ''
  png_compression: 3
  webp_quality: 90
inpainting:
  mask_dilation: 5
  method: opencv_ns
logging:
  backup_count: 5
  file: logs/trans_image.log
  level: INFO
  max_bytes: 10485760
ollama:
  base_url: http://localhost:11434
  default_model: llama3.1
processing:
  agent_analyze: true
  agent_validate: true
  default_agent_plugin: gemini
  default_ocr_plugin: easyocr
  default_source_lang: auto
  default_target_lang: ko
  default_translator_plugin: deepl
  use_agent: true
rendering:
  auto_font_size: true
  font_fallback: NotoSansCJK
  line_spacing: 1.2
  max_font_size: 72
  min_font_size: 8
