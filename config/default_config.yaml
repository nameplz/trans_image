# trans_image 기본 설정

app:
  name: "trans_image"
  version: "0.1.0"
  theme: "dark"  # dark | light
  language: "ko"  # UI 언어

processing:
  default_source_lang: "auto"  # auto 또는 언어 코드
  default_target_lang: "ko"
  default_ocr_plugin: "easyocr"
  default_translator_plugin: "deepl"
  default_agent_plugin: "claude"
  use_agent: true  # 에이전트 분석/검증 활성화
  agent_analyze: true
  agent_validate: true

inpainting:
  method: "opencv_ns"  # opencv_ns | lama
  mask_dilation: 5  # bbox 팽창 픽셀 수

rendering:
  auto_font_size: true
  min_font_size: 8
  max_font_size: 72
  font_fallback: "NotoSansCJK"
  line_spacing: 1.2

api_keys:
  # 환경변수 우선. 없을 경우 여기서 로드 (보안 주의)
  # 환경변수 이름: DEEPL_API_KEY / GOOGLE_API_KEY / XAI_API_KEY
  deepl: ""
  google: ""
  xai: ""
  anthropic: ""  # 또는 env: ANTHROPIC_API_KEY
  papago_client_id: ""
  papago_client_secret: ""

ollama:
  base_url: "http://localhost:11434"
  default_model: "llama3.1"

logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  file: "logs/trans_image.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

export:
  default_format: "png"  # png | jpg | webp
  jpg_quality: 95
  output_dir: ""  # 비어 있으면 원본 파일과 같은 디렉토리

chat:
  enabled: true
  llm_provider: "anthropic"      # anthropic | openai | ollama | grok
  llm_model: "claude-haiku-4-5-20251001"  # 경량 모델 — 의도 파악 전용
  max_history: 50
  default_output_suffix: "_translated"
